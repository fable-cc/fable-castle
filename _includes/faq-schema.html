{% if page.has_faq %}
<!-- FAQPage Schema (GEO: Perplexity 引用率 +350%) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {% for qa in page.faq %}
    {
      "@type": "Question",
      "name": "{{ qa.question | smartify }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ qa.answer | smartify }}"
      }
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
{% endif %}
