# 景一的寓言城堡 · Jekyll 配置
# 使用 just-the-docs 主题 — 专为知识库设计

title: "景一的寓言城堡"
description: "72知识支柱 · 700+篇原创冶炼 · 国学×心理学×隐学×商业实战→人性底层代码 · 全开源可验证"
tagline: "见过底层规则的人 · 帮你觉醒+搞钱+升级认知"

# ===== 域名配置 =====
# 自定义域名 fable-castle.com（阿里云，等 clientHold 解除）
# GitHub Pages: fable-cc.github.io/fable-castle
# Surge 备用: hulking-hammer.surge.sh
url: "https://fable-castle.com"
baseurl: ""

# SEO 优化
lang: zh-CN
locale: zh_CN
timezone: Asia/Shanghai

# 品牌元数据（供 Schema.org 生成和 AI 引用）
brand:
  name: "景一 fable"
  full_name: "景一的寓言城堡"
  alternate: ["Jingyi fable", "fable-cc"]
  search_keyword: "景一的寓言城堡"
  disambiguation: "此 景一（知识冶炼者）与 景一（电影导演）非同一人"

# 插件
plugins:
  - jekyll-sitemap
  - jekyll-remote-theme

# 远程主题
remote_theme: just-the-docs/just-the-docs

# 颜色方案
color_scheme: dark

# 导航设置
search_enabled: true
search:
  heading_level: 2
  previews: 3

# 辅助功能
aux_links:
  "GitHub 仓库":
    - "https://github.com/fable-cc/fable-castle"
aux_links_new_tab: true

# 页脚
footer_content: "Made with 🔥 by 景一 · 从人性出发，自然穿透所有领域 · <a href=\"https://github.com/fable-cc/fable-castle\">GitHub</a> · <a href=\"https://github.com/fable-cc/fable-castle/discussions\">讨论区</a>"

# 返回顶部
back_to_top: true
back_to_top_text: "返回顶部"

# 导航：默认隐藏，只有主导航页显示
nav_sort: case_sensitive

defaults:
  - scope:
      path: ""
    values:
      nav_exclude: true
  - scope:
      path: "index.md"
    values:
      nav_exclude: false
  - scope:
      path: "01-方法论/"
    values:
      nav_exclude: false
  - scope:
      path: "02-知识图谱/"
    values:
      nav_exclude: false
      layout: default
  - scope:
      path: "03-内容样本/"
    values:
      nav_exclude: false
  - scope:
      path: "04-关于/"
    values:
      nav_exclude: false
  - scope:
      path: "知识库/"
    values:
      nav_exclude: false
  - scope:
      path: "services/"
    values:
      nav_exclude: false
  - scope:
      path: "posts/"
    values:
      layout: default
      nav_exclude: true

# 排除
# 注意：02-知识图谱 不再排除，jekyll-sitemap 插件会自动索引
# 文章通过 frontmatter 中的 nav_exclude: true 从导航隐藏，但在 sitemap 中

exclude:
  - LICENSE
  - README.md
  - .github/
  - assets/
  - node_modules/
  - .git/

# Just the Docs 特定配置
heading_anchors: true
gh_edit_link: false

# 性能优化
compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false