name: 景一知识库管家

on:
  schedule:
    - cron: '0 21 * * *'  # 每天UTC 21:00 = 北京时间凌晨5点
  workflow_dispatch:

jobs:
  maintain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 更新站点统计
        run: |
          ARTICLE_COUNT=$(find 02-知识图谱 -name "*.md" ! -name "index*" ! -name "en-*" | wc -l)
          echo "📊 当前冶炼文章数: $ARTICLE_COUNT 篇"
          echo "📅 更新时间: $(date -u +'%Y-%m-%d %H:%M UTC')"
          echo "🔥 使命: 独立开源知识库"
          echo "article_count=$ARTICLE_COUNT" >> $GITHUB_OUTPUT

      - name: 生成状态徽章数据
        run: |
          mkdir -p assets
          COUNT=$(find 02-知识图谱 -name "*.md" ! -name "index*" ! -name "en-*" | wc -l | tr -d ' ')
          echo "{\"articles\": $COUNT, \"pillars\": 72, \"dimensions\": 12, \"updated\": \"$(date -Iseconds)\"}" > assets/stats.json

      - name: 提交统计更新
        run: |
          git config user.name "景一知识库管家"
          git config user.email "keeper@fable-castle.ai"
          git add assets/stats.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "统计无变化"
          else
            git commit -m "📊 每日统计更新"
            git push
          fi
