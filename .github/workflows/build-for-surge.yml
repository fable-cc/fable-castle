name: Jekyll Build for Surge

on:
  workflow_dispatch:
  push:
    branches: [geo-full-chain-repair]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - run: bundle install
      - run: bundle exec jekyll build
      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site/
