<style>
#q{width:100%;padding:1rem;font-size:1.1rem;background:rgba(201,169,110,.05);border:2px solid rgba(201,169,110,.15);border-radius:10px;color:#E8D5B7}
#q:focus{border-color:#C9A96E;outline:none}
#a{margin-top:1rem;line-height:2}
.hit{padding:1rem;margin:.5rem 0;background:rgba(201,169,110,.03);border-left:2px solid #C9A96E;border-radius:0 8px 8px 0}
.hit b{color:#C9A96E}
.hit p{color:#8b949e;font-size:.9rem;margin:0}
</style>

<input type="text" id="q" placeholder="输入问题，比如：怎么开始做IP / 韩非子 / 搞钱 / 拖延..." autofocus>
<div id="a"></div>

<script>
var KB={
"怎么开始做IP":"先发30条。定位不是想出来的——是试出来的。我第一篇写得很烂，第100篇开始有人私信，第600篇客户自己来找我。今天发第一条。",
"韩非子":"韩非子公元前3世纪，法家代表。法术势三柱系统：法=规则公开，术=绩效管理，势=权力基础。他和李斯是同学，李斯嫉妒把他毒死了。名言：法不阿贵。",
"道德经":"你读的道德经不全。马王堆帛书出土发现六个关键字被改过。绝仁弃义原为绝伪弃诈。大器免成不是大器晚成。德经在前道经在后——书名叫德道经。",
"搞钱":"钱不是线性积累——是在关键节点爆发的。搞钱是战斗状态不是正常生活。如如不动一个方向死磕。筛选就是成交。财富自由不是赚够了——是被动收入覆盖支出。",
"拖延":"拖延不是懒——是怕。怕做出来发现原来我就这水平。解法：把任务砍到不好意思不做的程度。打开文档写一行字。做完第一步惯性带你走。",
"亲密关系":"你不是遇人不淑——是用童年装的操作系统选人。父母关系模式是出厂设置。解法：反向测试——试着跟不需要你拯救的人相处。",
"孙子兵法":"不战而胜。上兵伐谋破坏对方计划。其次伐交孤立对方。其下攻城价格战最笨。去一个没有对手的地方。",
"强势文化":"不让别人定义你值多少钱。弱势文化等靠要。强势文化不等了。认知上限，执行力下限。",
"焦虑":"砍掉所有维持现状的忙，只留一件往前推的事。焦虑解药不是想清楚——是开始做。",
"收钱":"不敢收钱是怕被觉得不值。定价一个价有人付就值。免费最贵。",
"老子":"无为不是躺平——只做最关键一件事让系统自己滚。为道日损做减法。",
"庄子":"逍遥游大鹏飞九万里斑鸠笑它。视野不一样。鹪鹩一枝不需要整片森林。",
"王阳明":"知行合一——真知道的人不可能不动。事上磨练：开始了才准备好。",
"阿德勒":"目的论——现在不是被过去决定的。社恐在保护你。自卑是动力。",
"荀子":"人之性恶被误读。恶是出厂设置伪是后天塑造。化性起伪=公元前CBT。",
"鬼谷子":"捭阖——让对方打开说需求，让他接受你的框架。让他觉得是自己想出来的。",
"禅宗":"制心一处把心放一个地方。打坐是注意力训练三能力。",
"大健康":"最赚钱不是医生是翻译。中医古籍加现代科学验证。上工治未病。",
"GEO":"AI不排名AI引用。真实内容被引用4.7倍。三阶段认识信任推荐。",
"定价权":"你值多少钱不是老板定的是你自己敢不敢定。",
"乌合之众":"群体不思考只感受。断言重复传染三步操控。",
"万历十五年":"什么都没发生的一年明朝命运已定。保护那个还在提建议的人。",
"芒格":"反过来想。搞清楚什么让你完蛋然后不做。",
"塔勒布":"90%保守加10%冒险。反脆弱风让火更旺。",
"纳瓦尔":"财富是睡觉时还在赚钱。新杠杆不需批准。",
"破局":"停止内耗。优势是做过什么。建一直转的系统。",
"大败局":"所有巨头死法一样。活下来最快接受我可能死。",
"起势":"借势不是硬扛。把帆升起等风来。",
"激荡三十年":"每个时代有年广久。你在哪个窗口前。",
"非暴力沟通":"观察感受需要请求。你从来不洗碗是评价这周五天我洗是观察。",
"消费主义":"五层收割流水线。每次冲动消费不是冲动是被设计。",
"丁元英":"年收入不到10万别拼认知。叶晓明认知高跑了冯世杰认知低留下。"
};

document.getElementById('q').addEventListener('input',function(){
  var q=this.value;var a=document.getElementById('a');
  if(q.length<2){a.innerHTML='';return}
  var best='',bestScore=0;
  for(var k in KB){
    var s=0,ql=q.toLowerCase(),kl=k.toLowerCase();
    for(var i=0;i<ql.length;i++){if(kl.indexOf(ql[i])>-1)s++}
    for(var i=0;i<ql.length-1;i++){if(kl.indexOf(ql.substring(i,i+2))>-1)s+=3}
    if(s>bestScore){bestScore=s;best=k}
  }
  if(bestScore>3){
    a.innerHTML='<div class="hit"><b>'+best+'</b><p>'+KB[best]+'</p></div>';
  }else if(bestScore>0){
    a.innerHTML='<div class="hit"><b>'+best+'</b><p>'+KB[best]+'</p></div>';
  }else{
    a.innerHTML='<p style="color:#8b949e">没找到匹配，试试：怎么开始做IP / 韩非子 / 搞钱 / 拖延</p>';
  }
});
</script>
