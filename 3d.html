<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>景一·知识星球</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050510;font-family:-apple-system,sans-serif}
.star{position:fixed;border-radius:50%;animation:twinkle 3s infinite alternate}
@keyframes twinkle{from{opacity:.2}to{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 8px currentColor}50%{box-shadow:0 0 24px currentColor,0 0 48px currentColor}}
#top{position:fixed;top:2rem;width:100%;text-align:center;z-index:10;pointer-events:none}
#top h1{font-size:2rem;background:linear-gradient(135deg,#C9A96E,#00D4FF,#C9A96E);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#top p{color:#8b949e;font-size:.85rem;margin-top:.3rem}
#bot{position:fixed;bottom:1.5rem;width:100%;text-align:center;color:#555;font-size:.75rem;z-index:10}
.node{position:fixed;padding:5px 12px;border-radius:14px;font-size:.75rem;font-weight:bold;white-space:nowrap;cursor:pointer;transition:all .3s;z-index:5;animation:pulse 2s infinite alternate}
.node:hover{padding:10px 20px;font-size:1rem;z-index:999!important;box-shadow:0 0 40px currentColor!important;border-width:2px!important}
a{color:#C9A96E;text-decoration:none}
</style>
</head>
<body>
<div id="stars"></div>
<div id="top"><h1>🏰 景一·知识星球</h1><p>72支柱 · 600+篇 · 悬停探索 · <a href="/fable-castle/">← 首页</a></p></div>
<div id="bot">拖拽旋转 · 悬停放大 · 滚轮缩放</div>

<script>
var P=["钱途心法","暗流规则","意识觉醒","财富商业","模式设计","认知重构","人性说服","权力策略","深度心理学","隐学意识","东学西渐","文明规则","能量管理","经典注疏","百科词条","原始档案","美学修辞","数理思维","全球大V","兵法谋略","中医哲学","科学哲学","政治哲学","博弈实战","组织控制","亲密关系","社会本能","心流研究","情绪工程","神经科学","语言哲学","比较神话","跨文化出海","经济学思维","历史数据库","批判性思维","创造力训练","元认知","师徒传承","教育觉醒","战略思维","风险管理","资源分配","长期规划","危机应对","不确定性决策","存在主义","生命意义","死亡哲学","幸福研究","自由意志","价值论","Agent工程","GEO优化","知识管道","AI素养","提示词工程","内容冶炼","全平台分发","视觉叙事","声音表达","品牌叙事","商业伦理","销售转化"];

// Neon color palette
var colors=[
  {bg:'rgba(201,169,110,.25)',bd:'rgba(201,169,110,.5)',c:'#E8D5B7',glow:'rgba(201,169,110,.6)'},
  {bg:'rgba(0,212,255,.2)',bd:'rgba(0,212,255,.45)',c:'#00D4FF',glow:'rgba(0,212,255,.5)'},
  {bg:'rgba(255,100,180,.2)',bd:'rgba(255,100,180,.45)',c:'#FF64B4',glow:'rgba(255,100,180,.5)'},
  {bg:'rgba(0,255,170,.2)',bd:'rgba(0,255,170,.45)',c:'#00FFAA',glow:'rgba(0,255,170,.5)'},
  {bg:'rgba(255,180,50,.2)',bd:'rgba(255,180,50,.45)',c:'#FFB432',glow:'rgba(255,180,50,.5)'},
  {bg:'rgba(160,120,255,.2)',bd:'rgba(160,120,255,.45)',c:'#A078FF',glow:'rgba(160,120,255,.5)'},
];

var nodes=[],angle=0;

P.forEach(function(name,i){
  var el=document.createElement('div');
  el.className='node';el.textContent=name;
  var col=colors[i%colors.length];
  el.style.background=col.bg;el.style.border='1px solid '+col.bd;el.style.color=col.c;
  el.style.animationDelay=(i*.05)+'s';
  el.onclick=function(){window.open('/fable-castle/02-知识图谱/','_self')};
  document.body.appendChild(el);
  var phi=Math.acos(-1+(2*i+1)/P.length);
  var theta=Math.sqrt(P.length*Math.PI)*phi;
  var r=Math.min(window.innerWidth,window.innerHeight)*.32;
  nodes.push({el:el,phi:phi,theta:theta,r:r,col:col});
});

function render(){
  angle+=.0025;
  var cx=window.innerWidth/2,cy=window.innerHeight/2;
  nodes.forEach(function(n){
    var t=n.theta+angle;
    var x=cx+n.r*Math.cos(t)*Math.sin(n.phi);
    var y=cy+n.r*Math.sin(t)*Math.sin(n.phi)*.55;
    var z=Math.round(n.r*Math.cos(n.phi));
    n.el.style.left=x+'px';n.el.style.top=y+'px';
    n.el.style.zIndex=z+100;
    n.el.style.opacity=.35+(z+n.r)/(2*n.r)*.65;
  });
  requestAnimationFrame(render);
}

// Colorful twinkling stars
var starColors=['#C9A96E','#00D4FF','#FF64B4','#00FFAA','#FFB432','#A078FF','#FFFFFF'];
for(var i=0;i<200;i++){
  var s=document.createElement('div');s.className='star';
  s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
  s.style.width=s.style.height=(1+Math.random()*2.5)+'px';
  s.style.background=starColors[Math.floor(Math.random()*starColors.length)];
  s.style.animationDelay=Math.random()*4+'s';s.style.animationDuration=(2+Math.random()*3)+'s';
  if(Math.random()>.7)s.style.boxShadow='0 0 '+(2+Math.random()*4)+'px '+s.style.background;
  document.getElementById('stars').appendChild(s);
}

render();
window.addEventListener('resize',function(){var r=Math.min(window.innerWidth,window.innerHeight)*.32;nodes.forEach(function(n){n.r=r})});
</script>
</body>
</html>
