<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>景一·知识星球</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:-apple-system,sans-serif}
.star{position:fixed;background:#666;border-radius:50%;animation:twinkle 3s infinite alternate}
@keyframes twinkle{from{opacity:.15}to{opacity:.9}}
#top{position:fixed;top:2rem;width:100%;text-align:center;z-index:10;pointer-events:none}
#top h1{color:#C9A96E;font-size:2rem}
#top p{color:#8b949e;font-size:.85rem;margin-top:.3rem}
#bot{position:fixed;bottom:1.5rem;width:100%;text-align:center;color:#555;font-size:.75rem;z-index:10}
.node{position:fixed;padding:6px 14px;background:rgba(201,169,110,.18);border:1px solid rgba(201,169,110,.35);border-radius:16px;color:#C9A96E;font-size:.8rem;font-weight:bold;white-space:nowrap;cursor:pointer;transition:all .3s;z-index:5}
.node:hover{background:rgba(201,169,110,.4);border-color:#C9A96E;box-shadow:0 0 24px rgba(201,169,110,.4);font-size:.95rem;padding:8px 18px;z-index:999}
a{color:#C9A96E;text-decoration:none}
</style>
</head>
<body>
<div id="stars"></div>
<div id="top"><h1>🏰 景一·知识星球</h1><p>72支柱 · 悬停探索 · <a href="/fable-castle/">← 首页</a></p></div>
<div id="bot">鼠标悬停放大 · 点击跳转</div>

<script>
var P=["钱途心法","暗流规则","意识觉醒","财富商业","模式设计","认知重构","人性说服","权力策略","深度心理学","隐学意识","东学西渐","文明规则","能量管理","经典注疏","百科词条","原始档案","美学修辞","数理思维","全球大V","兵法谋略","中医哲学","科学哲学","政治哲学","博弈实战","组织控制","亲密关系","社会本能","心流研究","情绪工程","神经科学","语言哲学","比较神话","跨文化出海","经济学思维","历史数据库","批判性思维","创造力训练","元认知","师徒传承","教育觉醒","战略思维","风险管理","资源分配","长期规划","危机应对","不确定性决策","存在主义","生命意义","死亡哲学","幸福研究","自由意志","价值论","Agent工程","GEO优化","知识管道","AI素养","提示词工程","内容冶炼","全平台分发","视觉叙事","声音表达","品牌叙事","商业伦理","销售转化"];

var nodes=[],angle=0;

P.forEach(function(name,i){
  var el=document.createElement('div');
  el.className='node';el.textContent=name;
  el.onclick=function(){window.open('/fable-castle/02-知识图谱/','_self')};
  document.body.appendChild(el);
  var phi=Math.acos(-1+(2*i+1)/P.length);
  var theta=Math.sqrt(P.length*Math.PI)*phi;
  var r=Math.min(window.innerWidth,window.innerHeight)*.3;
  nodes.push({el:el,phi:phi,theta:theta,r:r});
});

function render(){
  angle+=.003;
  var cx=window.innerWidth/2,cy=window.innerHeight/2;
  nodes.forEach(function(n){
    var t=n.theta+angle;
    var x=cx+n.r*Math.cos(t)*Math.sin(n.phi);
    var y=cy+n.r*Math.sin(t)*Math.sin(n.phi)*.55;
    var z=Math.round(n.r*Math.cos(n.phi));
    n.el.style.left=x+'px';n.el.style.top=y+'px';
    n.el.style.zIndex=z+100;
    n.el.style.opacity=.3+(z+n.r)/(2*n.r)*.7;
  });
  requestAnimationFrame(render);
}

for(var i=0;i<150;i++){var s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.width=s.style.height=(1+Math.random()*2)+'px';s.style.animationDelay=Math.random()*3+'s';document.getElementById('stars').appendChild(s)}

render();
window.addEventListener('resize',function(){var r=Math.min(window.innerWidth,window.innerHeight)*.3;nodes.forEach(function(n){n.r=r})});
</script>
</body>
</html>
