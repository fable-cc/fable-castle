<script src="https://cdn.jsdelivr.net/npm/lunr@2.3.9/lunr.min.js"></script>
<script>
// Knowledge base index - key articles

  { title:"强势文化", text:"强势文化不是凶不是霸道 是不让别人定义你是谁 你值多少钱 弱者等待 强者不等 丁元英天道 不等了 现在开始", pillar:"暗流规则" },

  { title:"不战而胜", text:"孙子上兵伐谋 最好竞争不用竞争 伐谋伐交伐兵攻城 苹果不跟诺基亚比耐摔 去没有对手的地方", pillar:"权力策略" },
  { title:"政治哲学三定律", text:"荀子韩非马基雅维利霍布斯 人性不可信制度假设最坏 权力厌恶真空 合法性来自被相信", pillar:"政治哲学" },
  { title:"为什么你不敢收钱", text:"收钱不是索取是筛选 价格你定的 你不需要想值多少 定一个价有人付就值 免费最贵", pillar:"钱途心法" },
  { title:"为什么你总是拖延", text:"拖延不是懒是怕 怕做出来发现就这水平 不开始保护你 砍到不好意思不做 打开文档写一行字", pillar:"认知重构" },
  { title:"穷因为没穷过", text:"穷和苦两回事 老子不知知病也 佛家无明是第一因 刺激次数程度等于成长深度", pillar:"钱途心法" },

  { title:"万历十五年", text:"什么都没发生的一年明朝命运已定 制度烂了每个人做分内事系统分崩离析 万历躺平不是懒是绝望", pillar:"文明规则" },
  { title:"GEO个人实操版", text:"被AI引用不是被搜到 三阶段认识信任推荐 真实内容被引用概率是AI写作4.7倍 知识库就是资产", pillar:"AI工程" },
  { title:"博弈实战三原则", text:"不做单次博弈的好人 纳什均衡 信号比实力重要 囚徒困境 反复博弈才需要合作", pillar:"博弈实战" },
  { title:"为什么越努力越焦虑", text:"你忙的是维持现状 老子为学日益为道日损 砍掉所有维持现状的忙 只留一件往前推的事", pillar:"认知重构" },
  { title:"你不敢做IP", text:"不是能力不够是怕被看见 怕被说你也配 第一篇很烂第十篇也很烂 第100篇有人私信 先发30条", pillar:"个人IP" }
];

const idx = lunr(function() {
  this.ref('title');
  this.field('title', { boost: 10 });
  this.field('text');
  this.field('pillar');
  articles.forEach(a => this.add(a));
});

const input = document.getElementById('search-input');
const results = document.getElementById('results');
const stats = document.getElementById('stats');

input.addEventListener('input', function() {
  const q = this.value.trim();
  if (q.length < 2) { results.innerHTML = ''; stats.textContent = ''; return; }
  const matches = idx.search(q);
  stats.textContent = `找到 ${matches.length} 篇相关文章`;
  results.innerHTML = matches.map(m => {
    const a = articles.find(x => x.title === m.ref);
    return `<div class="result-item"><h3>${a.title} <small style="color:#8b949e">${a.pillar}</small></h3><p>${a.text.substring(0,150)}...</p></div>`;
  }).join('');
});
</script>
