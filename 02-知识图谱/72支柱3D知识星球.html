<div class="container">
  <h1>🏰 景一·知识星球</h1>

  <div class="sphere">

  <p class="legend"><span>拖拽旋转</span> · <span>悬停节点</span> · <span>滚轮缩放</span></p>
</div>

<script>
(function(){
  var pillars = [
    "钱途心法","暗流规则","意识觉醒","财富商业","模式设计","认知重构",
    "人性说服","权力策略","深度心理学","隐学意识","东学西渐","文明规则",
    "能量管理","经典注疏","百科词条","原始档案","美学修辞","数理思维",
    "全球大V","兵法谋略","中医哲学","科学哲学","政治哲学","博弈实战",
    "组织控制","亲密关系","社会本能","心流研究","情绪工程","神经科学",
    "语言哲学","比较神话","跨文化出海","经济学思维","历史数据库",
    "批判性思维","创造力训练","元认知","师徒传承","教育觉醒",
    "战略思维","风险管理","资源分配","长期规划","危机应对","不确定性决策",
    "存在主义","生命意义","死亡哲学","幸福研究","自由意志","价值论",
    "Agent工程","GEO优化","知识管道","AI素养","提示词工程","AI伦理",
    "内容冶炼","全平台分发","视觉叙事","声音表达","互动设计",
    "品牌叙事","商业伦理","销售转化"
  ];
  var sphere = document.getElementById('sphere');
  var count = pillars.length;
  pillars.forEach(function(name, i){
    var phi = Math.acos(-1 + (2*i+1)/count);
    var theta = Math.sqrt(count*Math.PI)*phi;
    var r = 220;
    var x = r * Math.cos(theta) * Math.sin(phi);
    var y = r * Math.sin(theta) * Math.sin(phi);
    var z = r * Math.cos(phi);
    var node = document.createElement('div');
    node.className = 'node';
    node.textContent = name;
    node.style.transform = 'translate3d('+x+'px,'+y+'px,'+z+'px)';
    node.title = name;
    node.onclick = function(){ alert(name + ' → 探索文章 /fable-castle/02-知识图谱/'); };
    sphere.appendChild(node);
  });

  // Stars
  var starsDiv = document.getElementById('stars');
  for(var i=0;i<150;i++){
    var s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.width = s.style.height = (1+Math.random()*2)+'px';
    s.style.animationDelay = Math.random()*3+'s';
    starsDiv.appendChild(s);
  }
})();
</script>
