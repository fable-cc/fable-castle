function buildCards() {
  pillars.forEach(p => {
    const card = document.createElement('div');
    card.className = 'pillar-card';
    card.dataset.name = p.name;
    card.dataset.desc = p.desc;
    card.innerHTML = `<span class="emoji">${p.emoji}</span> <h3>${p.name}</h3><p class="desc">${p.desc}</p><span class="count">${p.count}篇</span>`;
    if (p.articles) {
      const arts = document.createElement('div');
      arts.className = 'articles';
      p.articles.forEach(a => { const link = document.createElement('a'); link.href = '#'; link.textContent = a; arts.appendChild(link); });
      card.appendChild(arts);
      card.onclick = () => card.classList.toggle('open');
    }
    document.getElementById(p.id === 'core' ? 'core' : p.id === 'ext' ? 'extended' : 'foundation').appendChild(card);
  });
}

function filterCards() {
  const q = document.getElementById('search-box').value.toLowerCase();
  document.querySelectorAll('.pillar-card').forEach(c => {
    c.style.display = (c.dataset.name + c.dataset.desc).toLowerCase().includes(q) ? '' : 'none';
  });
}

buildCards();
</script>
